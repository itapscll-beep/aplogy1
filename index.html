<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Love ❤️</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1077/1077035.png">

    <style>
        :root { --primary: #ff5e62; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            background: #fff5f5;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }
        .app-card {
            background: white; padding: 40px 20px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center; width: 85%; max-width: 350px;
            position: relative; z-index: 10;
        }
        .emoji-header { font-size: 60px; margin-bottom: 10px; }
        h1 { color: #333; font-size: 24px; margin: 10px 0; }
        p { color: #666; font-size: 16px; line-height: 1.5; padding: 0 10px; }
        
        .btn-container {
            margin-top: 30px; display: flex; justify-content: center; gap: 15px;
            height: 50px; position: relative;
        }
        button {
            padding: 12px 30px; border-radius: 25px; border: none;
            font-weight: bold; font-size: 16px; transition: 0.2s;
            cursor: pointer;
        }
        #yesBtn { background: var(--primary); color: white; min-width: 100px; }
        #noBtn { 
            background: #f0f0f0; color: #888; min-width: 100px;
            position: absolute; z-index: 999;
        }
        .success { display: none; color: #2ecc71; margin-top: 20px; font-weight: bold; font-size: 18px; }
        
        .falling-emoji {
            position: absolute; top: -50px; font-size: 20px;
            animation: fall 4s linear infinite; z-index: 1;
        }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

<div class="app-card" id="mainCard">
    <div class="emoji-header" id="face">🥺</div>
    <h1>I'm So Sorry...</h1>
    <p>I know I broke my promise and I hate that I let you down. You mean everything to me. Can we try again?</p>
    
    <div class="btn-container">
        <button id="yesBtn" onclick="forgive()">Yes</button>
        <button id="noBtn" onmouseover="moveBtn()" ontouchstart="moveBtn()">No</button>
    </div>
    <div id="status" class="success">I love you! I won't let you down. ❤️</div>
</div>

<script>
    function moveBtn() {
        const btn = document.getElementById('noBtn');
        // Calculate safe zone (80% of screen) to keep button reachable but moving
        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight);
        
        btn.style.position = 'fixed';
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    }

    function forgive() {
        document.getElementById('status').style.display = 'block';
        document.getElementById('noBtn').style.display = 'none';
        document.getElementById('face').innerText = '💖';
        document.getElementById('yesBtn').style.transform = 'scale(1.2)';
        alert("I promise to be better. Thank you for another chance! ❤️");
    }

    // Falling sad emojis
    setInterval(() => {
        const e = document.createElement('div');
        e.classList.add('falling-emoji');
        e.innerText = '😭';
        e.style.left = Math.random() * 100 + 'vw';
        e.style.animationDuration = (Math.random() * 2 + 2) + 's';
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 4000);
    }, 600);
</script>

</body>
</html>
