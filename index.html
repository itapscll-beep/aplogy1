<div class="btn-container">
    <button id="yesBtn" onclick="forgive()">Yes</button>
    <button id="noBtn" ontouchstart="moveBtn(event)" onmouseover="moveBtn(event)">No</button>
</div>

<script>
    function moveBtn(event) {
        // Prevent the actual click/tap from happening
        if (event) event.preventDefault(); 
        
        const btn = document.getElementById('noBtn');
        
        // Calculate random positions
        // Subtracting 100 to keep the button from going off-screen
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 100);
        
        btn.style.position = 'fixed';
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
        btn.style.zIndex = "1000"; // Keep it on top of everything
    }

    function forgive() {
        document.getElementById('status').style.display = 'block';
        document.getElementById('noBtn').style.display = 'none';
        document.getElementById('face').innerText = '💖';
        alert("I promise to be better. Thank you for another chance! ❤️");
    }
</script>
